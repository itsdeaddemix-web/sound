<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DemixSound Pro</title>
    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #121212;
            --accent-color: #1DB954; /* Spotify Green */
            --text-color: #ffffff;
            --text-secondary: #b3b3b3;
            --input-bg: #282828;
            --nav-bg: #000000d0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
            padding-bottom: 120px; /* Місце для нижньої навігації та міні-плеєра */
        }

        /* ЗАГОЛОВОК (ВЕРХНЯ ПАНЕЛЬ) */
        .header {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background-color: var(--bg-color);
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: #fff;
            color: #000;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem;
            object-fit: cover;
        }
        .header-title { font-size: 1.5rem; font-weight: 700; }
        .header-icons { display: flex; gap: 20px; color: var(--text-secondary); font-size: 1.5rem; }

        /* ФІЛЬТРИ ТА СОРТУВАННЯ */
        .controls-area { padding: 0 16px 16px 16px; }
        .filters { display: flex; gap: 8px; margin-bottom: 16px; }
        .filter-btn {
            background: #282828;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }
        .filter-btn.active { background: var(--accent-color); color: black; }

        .sort-row {
            display: flex; justify-content: space-between; align-items: center;
            color: var(--text-secondary); font-size: 0.9rem;
        }
        .sort-btn { background: transparent; border: none; color: inherit; font-size: inherit; display: flex; align-items: center; gap: 4px; }

        /* СПИСОК БІБЛІОТЕКИ */
        .library-container { padding: 0 16px; }
        .library-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 0;
            cursor: pointer;
        }
        .library-item:active { background: #121212; }
        
        .item-main { display: flex; align-items: center; flex-grow: 1; min-width: 0; }
        .item-cover { width: 56px; height: 56px; border-radius: 4px; margin-right: 12px; object-fit: cover; background: #282828; }
        .item-info { text-align: left; min-width: 0; }
        .item-title { font-size: 1rem; font-weight: 600; color: white; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-subtitle { font-size: 0.85rem; color: var(--text-secondary); }
        .pin-icon { color: var(--accent-color); margin-right: 6px; }

        .item-stats-btn { background: transparent; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; padding: 10px; }

        /* БЛОКИ КЕРУВАННЯ ТА ДОДАВАННЯ */
        .section-box {
            background: var(--surface-color);
            padding: 16px;
            border-radius: 8px;
            margin: 16px;
            box-sizing: border-box;
            display: none; /* Приховано за замовчуванням */
        }
        .section-box.visible { display: block; }
        .section-box h3 { margin-top: 0; font-size: 1.2rem; font-weight: 700; display: flex; justify-content: space-between; }
        .btn-close { background: transparent; border: none; color: white; cursor: pointer; font-size: 1.3rem; }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
            border: 1px solid #333;
            background: var(--input-bg);
            color: white;
            box-sizing: border-box;
            font-size: 0.95rem;
        }
        input[type="file"] { border: 1px solid #1DB954; color: var(--accent-color); } /* Виділення аудіофайлу */

        .btn-submit {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
        }
        .btn-submit:hover { background: var(--accent-color); }

        /* МІНІ-ПЛЕЄР ЗНИЗУ */
        .mini-player {
            position: fixed;
            bottom: 60px; /* Трохи вище нижньої навігації */
            left: 8px; right: 8px;
            height: 56px;
            background-color: #282828;
            border-radius: 8px;
            padding: 8px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 90;
            transform: translateY(200%);
            transition: transform 0.3s ease;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
        }
        .mini-player.visible { transform: translateY(0); }

        .mp-cover { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
        .mp-info { flex-grow: 1; margin: 0 12px; text-align: left; min-width: 0; }
        .mp-title { font-size: 0.95rem; font-weight: 600; color: white; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mp-artist { font-size: 0.8rem; color: var(--accent-color); }
        .mp-controls { display: flex; gap: 16px; color: white; font-size: 1.5rem; }

        /* НИЖНЯ НАВІГАЦІЯ */
        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background-color: var(--nav-bg);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 16px;
            z-index: 100;
            border-top: 1px solid #282828;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-secondary); font-size: 0.7rem; gap: 4px;
            cursor: pointer;
        }
        .nav-item.active { color: white; }
        .nav-icon { font-size: 1.5rem; }

        /* ВІКНО СТАТИСТИКИ (OVERLAY) */
        .stats-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            align-items: center; justify-content: center;
            padding: 20px;
        }
        .stats-overlay.visible { display: flex; }

        .stats-content {
            background-color: var(--surface-color);
            padding: 24px;
            border-radius: 12px;
            width: 100%; max-width: 320px;
            text-align: center;
        }
        .stats-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .stats-title { font-size: 1.2rem; font-weight: 700; }
        .stats-body ul { list-style: none; padding: 0; margin: 15px 0 0 0; text-align: left; max-height: 200px; overflow-y: auto;}
        .stats-body li { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 6px;}

        /* Прихований аудіо плеєр */
        #audio-main, #audio-crossfade { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <div class="avatar" id="avatar-circle">D</div>
            <div class="header-title">Моя бібліотека</div>
        </div>
        <div class="header-icons">
            <div>🔍</div>
            <div onclick="showAddForm()">＋</div>
        </div>
    </div>

    <div class="controls-area">
        <div class="filters">
            <button class="filter-btn active" id="filter-all">Усі</button>
            <button class="filter-btn" id="filter-playlists">Плейлісти</button>
            <button class="filter-btn">Альбоми</button>
            <button class="filter-btn">Виконавці</button>
        </div>
        <div class="sort-row">
            <button class="sort-btn">⇅ Нещодавні</button>
            <div>🎦</div>
        </div>
    </div>

    <div class="library-container" id="library-container"></div>

    <div class="section-box" id="add-playlist-form">
        <h3><span>Створити новий плейліст</span> <button class="btn-close" onclick="hideAddForm()">×</button></h3>
        <input type="text" id="new-playlist-name" placeholder="Назва плейлісту">
        <button class="btn-submit" onclick="createNewPlaylist()">Створити плейліст</button>
    </div>

    <div class="section-box" id="add-track-form">
        <h3><span>Додати пісню (MP3/M4A)</span> <button class="btn-close" onclick="hideAddForm()">×</button></h3>
        <input type="file" id="file-input" accept=".mp3, .m4a, .aac, .wav, audio/*" required>
        <input type="text" id="track-title" placeholder="Назва пісні" required>
        <input type="text" id="track-artist" placeholder="Виконавець" required>
        <input type="text" id="track-cover" placeholder="URL обкладинки (картинки)">
        <select id="track-playlist-select">
            <option value="none">Усі пісні (All Tracks)</option>
        </select>
        <button class="btn-submit" onclick="saveTrack()">Зберегти в бібліотеку</button>
    </div>

    <div class="mini-player" id="mini-player">
        <img src="" class="mp-cover" id="mp-cover">
        <div class="mp-info">
            <div class="mp-title" id="mp-title"></div>
            <div class="mp-artist" id="mp-artist"></div>
        </div>
        <div class="mp-controls">
            <div>⏮</div>
            <div id="mp-play-btn" onclick="togglePlay()">▶️</div>
            <div>⏭</div>
        </div>
        <audio id="audio-main"></audio>
        <audio id="audio-crossfade"></audio>
    </div>

    <div class="nav-bar">
        <div class="nav-item">
            <div class="nav-icon">🏠</div>
            <div>Головна</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">🔍</div>
            <div>Пошук</div>
        </div>
        <div class="nav-item active">
            <div class="nav-icon">📚</div>
            <div>Моя бібліотека</div>
        </div>
        <div class="nav-item" onclick="showAddForm()">
            <div class="nav-icon">＋</div>
            <div>Створити</div>
        </div>
    </div>

    <div class="stats-overlay" id="stats-overlay">
        <div class="stats-content">
            <div class="stats-header">
                <div class="stats-title">Статистика треку</div>
                <button class="btn-close" onclick="closeStats()">×</button>
            </div>
            <div class="stats-body">
                <div>Загалом прослухано: <strong id="stats-total">0</strong> разів</div>
                <ul id="stats-history"></ul>
            </div>
        </div>
    </div>

    <script>
        let db;
        let allTracks = [];
        let allPlaylists = [];
        let currentPlaylistId = 'all';
        let isPlaying = false;
        let currentTrackIndex = -1;

        const audioMain = document.getElementById('audio-main');
        const audioCrossfade = document.getElementById('audio-crossfade');
        const miniPlayer = document.getElementById('mini-player');
        const mpPlayBtn = document.getElementById('mp-play-btn');

        // Ініціалізація Бази Даних у пам'яті iPhone
        const request = indexedDB.open("DemixSoundLibrary_v2", 1);
        
        request.onupgradeneeded = function(e) {
            db = e.target.result;
            // Таблиця треків (id, назва, виконавець, обкладинка, файл, плейліст, прослуховування)
            db.createObjectStore("tracks", { keyPath: "id", autoIncrement: true });
            // Таблиця плейлістів (id, назва)
            db.createObjectStore("playlists", { keyPath: "id", autoIncrement: true });
            // Таблиця історії (id_треку, timestamp) - для детальної статистики
            db.createObjectStore("history", { keyPath: "id", autoIncrement: true }).createIndex("trackId", "trackId", { unique: false });
        };

        request.onsuccess = function(e) {
            db = e.target.result;
            loadLibraryData(); // Завантажуємо все при старті
        };

        // Завантаження даних бібліотеки
        function loadLibraryData() {
            const transaction = db.transaction(["tracks", "playlists"], "readonly");
            const trackStore = transaction.objectStore("tracks");
            const playlistStore = transaction.objectStore("playlists");

            const tracksReq = trackStore.getAll();
            const playlistsReq = playlistStore.getAll();

            Promise.all([
                new Promise(resolve => tracksReq.onsuccess = () => resolve(tracksReq.result)),
                new Promise(resolve => playlistsReq.onsuccess = () => resolve(playlistsReq.result))
            ]).then(([tracks, playlists]) => {
                allTracks = tracks;
                allPlaylists = playlists;
                renderLibraryList(); // Відображаємо список
                updatePlaylistSelects(); // Оновлюємо вибір плейлісту у формі
            });
        }

        // Відображення списку Бібліотеки (Плейлісти + Треки)
        function renderLibraryList() {
            const container = document.getElementById('library-container');
            container.innerHTML = '';

            // 1. Спочатку показуємо плейлісти, як на скріншоті
            allPlaylists.forEach(playlist => {
                const item = document.createElement('div');
                item.className = 'library-item';
                item.innerHTML = `
                    <div class="item-main">
                        <div class="item-cover" style="background:#282828; display:flex; align-items:center; justify-content:center; color:#555; font-size:1.5rem;">📁</div>
                        <div class="item-info">
                            <div class="item-title">${playlist.name}</div>
                            <div class="item-subtitle">Плейліст · demix</div>
                        </div>
                    </div>
                    <div><span class="pin-icon">📌</span></div>
                `;
                container.appendChild(item);
            });

            // 2. Потім показуємо треки, якщо вибрано "Усі"
            if (currentPlaylistId === 'all') {
                allTracks.forEach((track, index) => {
                    const item = document.createElement('div');
                    item.className = 'library-item';
                    item.innerHTML = `
                        <div class="item-main" onclick="playTrack(${index})">
                            <img src="${track.cover || 'https://via.placeholder.com/56'}" class="item-cover">
                            <div class="item-info">
                                <div class="item-title">${track.title}</div>
                                <div class="item-subtitle">${track.artist} · Слухано: ${track.plays}</div>
                            </div>
                        </div>
                        <button class="item-stats-btn" onclick="openStats(${track.id}, event)">📊</button>
                    `;
                    container.appendChild(item);
                });
            }
        }

        // Керування формами додавання
        function showAddForm() {
            const hideAll = () => {
                document.getElementById('add-playlist-form').classList.remove('visible');
                document.getElementById('add-track-form').classList.remove('visible');
            };

            if (currentPlaylistId === 'all') {
                if (!document.getElementById('add-track-form').classList.contains('visible')) {
                    hideAll();
                    document.getElementById('add-track-form').classList.add('visible');
                } else {
                    hideAll();
                }
            } else {
                if (!document.getElementById('add-playlist-form').classList.contains('visible')) {
                    hideAll();
                    document.getElementById('add-playlist-form').classList.add('visible');
                } else {
                    hideAll();
                }
            }
        }
        function hideAddForm() {
            document.getElementById('add-playlist-form').classList.remove('visible');
            document.getElementById('add-track-form').classList.remove('visible');
        }

        // Створення Плейлісту
        function createNewPlaylist() {
            const name = document.getElementById('new-playlist-name').value.trim();
            if(!name) return;
            const transaction = db.transaction(["playlists"], "readwrite");
            transaction.objectStore("playlists").add({ name });
            transaction.oncomplete = () => {
                document.getElementById('new-playlist-name').value = '';
                hideAddForm();
                loadLibraryData();
            };
        }

        function updatePlaylistSelects() {
            const select = document.getElementById('track-playlist-select');
            select.innerHTML = '<option value="none">Усі пісні (All Tracks)</option>';
            allPlaylists.forEach(p => select.innerHTML += `<option value="${p.id}">${p.name}</option>`);
        }

        // Збереження Аудіофайлу та Інфо в Бібліотеку
        function saveTrack() {
            const fileInput = document.getElementById('file-input');
            const titleInput = document.getElementById('track-title');
            const artistInput = document.getElementById('track-artist');
            const coverInput = document.getElementById('track-cover');
            const playlistSelect = document.getElementById('track-playlist-select');

            if (!fileInput.files[0] || !titleInput.value || !artistInput.value) {
                alert("Будь ласка, заповніть усі обов'язкові поля!");
                return;
            }

            const file = fileInput.files[0];
            const transaction = db.transaction(["tracks"], "readwrite");
            const newTrack = {
                title: titleInput.value.trim(),
                artist: artistInput.value.trim(),
                cover: coverInput.value.trim(),
                file: file, // Зберігаємо файл як бінарний об'єкт (Blob)
                playlistId: playlistSelect.value,
                plays: 0
            };

            transaction.objectStore("tracks").add(newTrack);
            transaction.oncomplete = () => {
                // Очищення полів
                titleInput.value = ''; artistInput.value = ''; coverInput.value = ''; fileInput.value = '';
                hideAddForm();
                loadLibraryData();
            };
        }

        // Керування відтворенням
        function playTrack(index) {
            currentTrackIndex = index;
            const track = allTracks[index];

            // Оновлення міні-плеєра
            document.getElementById('mp-cover').src = track.cover || 'https://via.placeholder.com/40';
            document.getElementById('mp-title').innerText = track.title;
            document.getElementById(' mp-artist').innerText = track.artist;
            miniPlayer.classList.add('visible');

            // Створення тимчасового посилання на файл в пам'яті для аудіо тегу
            if(audioMain.src) URL.revokeObjectURL(audioMain.src);
            audioMain.src = URL.createObjectURL(track.file);
            audioMain.volume = 1;
            togglePlay(true);
        }

        function togglePlay(forcePlay = false) {
            if (audioMain.paused || forcePlay) {
                audioMain.play().catch(e => console.log("Чекаємо взаємодії користувача"));
                isPlaying = true;
                mpPlayBtn.innerText = "⏸️"; // Пауза
            } else {
                audioMain.pause();
                isPlaying = false;
                mpPlayBtn.innerText = "▶️"; // Грати
            }
        }

        // Лічильник прослуховувань + Перемикання
        audioMain.onended = function() {
            if (currentTrackIndex !== -1) {
                const track = allTracks[currentTrackIndex];
                
                // Записуємо прослуховування
                track.plays += 1;

                const transaction = db.transaction(["tracks", "history"], "readwrite");
                transaction.objectStore("tracks").put(track);
                // Також фіксуємо точний час прослуховування для історії статистики
                transaction.objectStore("history").add({ trackId: track.id, timestamp: Date.now() });

                transaction.oncomplete = function() {
                    loadLibraryData(); // Оновити список з новим лічильником

                    // Перехід на наступний трек, якщо є
                    if (currentTrackIndex + 1 < allTracks.length) {
                        playTrack(currentTrackIndex + 1);
                    } else {
                        // Якщо кінець списку
                        isPlaying = false;
                        mpPlayBtn.innerText = "▶️";
                        miniPlayer.classList.remove('visible');
                    }
                };
            }
        };

        // Розширена статистика (Overaly)
        function openStats(trackId, event) {
            event.stopPropagation(); // Зупинити клік, щоб не запустити пісню
            const transaction = db.transaction(["tracks", "history"], "readonly");
            const trackReq = transaction.objectStore("tracks").get(trackId);
            
            trackReq.onsuccess = function() {
                const track = trackReq.result;
                document.getElementById('stats-total').innerText = track.plays;
                
                const historyReq = transaction.objectStore("history").index("trackId").getAll(trackId);
                historyReq.onsuccess = function() {
                    const history = historyReq.result;
                    const historyList = document.getElementById('stats-history');
                    historyList.innerHTML = '';
                    
                    if(history.length > 0) {
                        // Беремо останні 10 прослуховувань
                        history.sort((a, b) => b.timestamp - a.timestamp).slice(0, 10).forEach(item => {
                            const date = new Date(item.timestamp);
                            historyList.innerHTML += `<li>${date.toLocaleDateString('uk-UA')} ${date.toLocaleTimeString('uk-UA')}</li>`;
                        });
                    } else {
                        historyList.innerHTML = '<li>Історії прослуховувань поки немає.</li>';
                    }
                    
                    document.getElementById('stats-overlay').classList.add('visible');
                }
            };
        }

        function closeStats() {
            document.getElementById('stats-overlay').classList.remove('visible');
        }

        // Фільтри вкладки
        document.getElementById('filter-all').onclick = () => {
            currentPlaylistId = 'all';
            loadLibraryData();
            // Зміна активного стану кнопок
        };
    </script>
</body>
</html>
