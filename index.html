<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DemixSound Pro</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-color: #121212;
            --accent-color: #1DB954; /* Spotify Green */
            --text-color: #ffffff;
            --text-secondary: #b3b3b3;
            --danger-color: #f15e6c;
            --surface-color: #181818;
            --input-bg: #282828;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Картка плеєра */
        .player-card {
            background: linear-gradient(180deg, #222222 0%, var(--card-color) 100%);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            box-sizing: border-box;
        }

        .cover-art {
            width: 280px;
            height: 280px;
            background: #282828;
            border-radius: 12px;
            margin: 0 auto 25px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 12px 28px rgba(0,0,0,0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h2 { margin: 15px 0 5px; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.04em; }
        .artist-name { color: var(--text-secondary); margin: 0 0 20px; font-size: 1rem; }

        /* Кнопки керування */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .btn-main {
            background: var(--accent-color);
            border: none;
            color: black;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.4);
        }
        .btn-main:active { transform: scale(0.95); }

        .btn-nav {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .btn-nav:hover { color: var(--accent-color); }

        .stats {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Блоки інтерфейсу */
        .section-box {
            background: var(--card-color);
            padding: 22px;
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            margin-top: 20px;
            box-sizing: border-box;
        }

        .section-box h3 { margin-top: 0; font-size: 1.2rem; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background: var(--input-bg);
            color: white;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        .btn-action {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .btn-action:hover { background: var(--accent-color); }

        /* Плейлісти вкладки */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .tab {
            background: #282828;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .tab.active { background: var(--accent-color); color: black; }

        /* Елементи списку пісень */
        .playlist-item {
            background: transparent;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.2s;
        }
        .playlist-item:hover { background: #282828; }
        
        .track-click-area { display: flex; align-items: center; flex-grow: 1; min-width: 0; }
        .playlist-item img { width: 46px; height: 46px; border-radius: 4px; margin-right: 15px; object-fit: cover; }
        .playlist-info { text-align: left; min-width: 0; }
        .playlist-info div { font-size: 0.95rem; font-weight: 600; color: white; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .playlist-info span { font-size: 0.8rem; color: var(--text-secondary); }

        .item-actions button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 5px;
        }
        .item-actions .btn-del:hover { color: var(--danger-color); }
        .item-actions .btn-edit:hover { color: var(--accent-color); }

        /* Налаштування */
        .settings-container { display: none; }
        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #282828;
        }

        /* iOS Switch */
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .3s; border-radius: 30px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="cover-art" id="cover" style="background-image: url('https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=500')"></div>
        <h2 id="title">Медіатека порожня</h2>
        <p class="artist-name" id="artist">Додайте музику нижче</p>

        <audio id="audio-player"></audio>
        <audio id="audio-player-next" style="display:none;"></audio>

        <div class="controls">
            <button class="btn-nav" onclick="playPrev()">⏮</button>
            <button class="btn-main" id="play-btn" onclick="togglePlay()">ГРАТИ</button>
            <button class="btn-nav" onclick="playNext()">⏭</button>
        </div>

        <div class="stats">
            Прослуховувань цього треку: <span id="listen-count">0</span>
        </div>
    </div>

    <div class="section-box">
        <h3>Створити новий Плейліст</h3>
        <input type="text" id="new-playlist-name" placeholder="Назва (напр. Для тренувань)">
        <button class="btn-action" onclick="createNewPlaylist()">Створити плейліст</button>
    </div>

    <div class="section-box">
        <h3>Додати нову пісню</h3>
        <input type="file" id="file-input" accept="audio/*">
        <input type="text" id="track-title" placeholder="Назва пісні">
        <input type="text" id="track-artist" placeholder="Виконавець">
        <input type="text" id="track-cover" placeholder="URL обкладинки (картинки)">
        <select id="track-playlist-select">
            <option value="all">Усі пісні</option>
        </select>
        <button class="btn-action" onclick="saveTrack()">Зберегти в медіатеку</button>
    </div>

    <div class="section-box">
        <h3>
            <span>Моя музика</span>
            <button style="background:transparent; border:none; font-size:1.3rem; cursor:pointer; color:var(--text-secondary);" onclick="toggleSettings()">⚙️</button>
        </h3>
        
        <div class="tabs" id="playlist-tabs">
            <div class="tab active" onclick="switchPlaylist('all')">Усі пісні</div>
        </div>

        <div id="playlist-container"></div>
    </div>

    <div class="section-box settings-container" id="settings-container">
        <h3>Налаштування <button style="background:transparent; border:none; color:white; cursor:pointer;" onclick="toggleSettings()">×</button></h3>
        
        <div class="settings-item">
            <label>Плавний перехід (Crossfade 4с)</label>
            <label class="switch">
                <input type="checkbox" id="crossfade-switch" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="settings-item">
            <label>Анімація обкладинки (Zoom)</label>
            <label class="switch">
                <input type="checkbox" id="cover-zoom-switch" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <script>
        let db;
        let allTracks = [];
        let currentPlaylist = 'all';
        let filteredTracks = [];
        let currentTrackIndex = -1;
        let isCrossfading = false;
        let playlistsList = ['all'];

        const audio = document.getElementById('audio-player');
        const audioNext = document.getElementById('audio-player-next');
        const playBtn = document.getElementById('play-btn');
        const coverArt = document.getElementById('cover');
        const crossfadeSwitch = document.getElementById('crossfade-switch');
        const coverZoomSwitch = document.getElementById('cover-zoom-switch');

        // Ініціалізація бази даних у пам'яті iPhone
        const request = indexedDB.open("DemixMusicPlayerDB", 2);
        
        request.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("tracks")) {
                db.createObjectStore("tracks", { keyPath: "id", autoIncrement: true });
            }
        };

        request.onsuccess = function(e) {
            db = e.target.result;
            loadPlaylistsFromStorage();
            loadTracks();
        };

        // Завантаження створених плейлістів
        function loadPlaylistsFromStorage() {
            const saved = localStorage.getItem('demix_playlists');
            if (saved) {
                playlistsList = JSON.parse(saved);
                renderPlaylistTabs();
                updatePlaylistSelect();
            }
        }

        function createNewPlaylist() {
            const name = document.getElementById('new-playlist-name').value.trim();
            if(!name) return;
            if(playlistsList.includes(name)) { alert("Такий плейліст вже існує!"); return; }
            
            playlistsList.push(name);
            localStorage.setItem('demix_playlists', JSON.stringify(playlistsList));
            document.getElementById('new-playlist-name').value = '';
            renderPlaylistTabs();
            updatePlaylistSelect();
        }

        function renderPlaylistTabs() {
            const container = document.getElementById('playlist-tabs');
            container.innerHTML = `<div class="tab ${currentPlaylist === 'all' ? 'active' : ''}" onclick="switchPlaylist('all')">Усі пісні</div>`;
            playlistsList.forEach(p => {
                if(p !== 'all') {
                    container.innerHTML += `<div class="tab ${currentPlaylist === p ? 'active' : ''}" onclick="switchPlaylist('${p}')">${p}</div>`;
                }
            });
        }

        function updatePlaylistSelect() {
            const select = document.getElementById('track-playlist-select');
            select.innerHTML = '<option value="all">Усі пісні</option>';
            playlistsList.forEach(p => {
                if(p !== 'all') {
                    select.innerHTML += `<option value="${p}">${p}</option>`;
                }
            });
        }

        function switchPlaylist(pName) {
            currentPlaylist = pName;
            renderPlaylistTabs();
            renderTracksList();
        }

        // Збереження треку
        function saveTrack() {
            const fileInput = document.getElementById('file-input');
            const title = document.getElementById('track-title').value.trim() || "Без назви";
            const artist = document.getElementById('track-artist').value.trim() || "Невідомий";
            let cover = document.getElementById('track-cover').value.trim() || "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=500";
            const targetPlaylist = document.getElementById('track-playlist-select').value;

            if (!fileInput.files[0]) { alert("Оберіть аудіофайл!"); return; }

            const file = fileInput.files[0];
            const transaction = db.transaction(["tracks"], "readwrite");
            const store = transaction.objectStore("tracks");

            const newTrack = { title, artist, cover, file, playlistName: targetPlaylist, plays: 0 };
            store.add(newTrack);

            transaction.oncomplete = function() {
                document.getElementById('track-title').value = '';
                document.getElementById('track-artist').value = '';
                document.getElementById('track-cover').value = '';
                fileInput.value = '';
                loadTracks();
            };
        }

        function loadTracks() {
            const transaction = db.transaction(["tracks"], "readonly");
            const store = transaction.objectStore("tracks");
            const req = store.getAll();

            req.onsuccess = function() {
                allTracks = req.result;
                renderTracksList();
            };
        }

        function renderTracksList() {
            const container = document.getElementById('playlist-container');
            container.innerHTML = '';

            if (currentPlaylist === 'all') {
                filteredTracks = allTracks;
            } else {
                filteredTracks = allTracks.filter(t => t.playlistName === currentPlaylist);
            }

            if(filteredTracks.length === 0) {
                container.innerHTML = '<p style="font-size:0.9rem; color:#555; text-align:center;">Тут поки порожньо...</p>';
                return;
            }

            filteredTracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'playlist-item';
                item.innerHTML = `
                    <div class="track-click-area" onclick="selectTrack(${index})">
                        <img src="${track.cover}">
                        <div class="playlist-info">
                            <div>${track.title}</div>
                            <span>${track.artist} · 🎧 ${track.plays}</span>
                        </div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-edit" onclick="editTrack(${track.id}, event)">✏️</button>
                        <button class="btn-del" onclick="deleteTrack(${track.id}, event)">×</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // Корегування (редагування) треку прямо з екрана
        function editTrack(id, event) {
            event.stopPropagation();
            const transaction = db.transaction(["tracks"], "readwrite");
            const store = transaction.objectStore("tracks");
            
            store.get(id).onsuccess = function(e) {
                const track = e.target.result;
                const newTitle = prompt("Введіть нову назву пісні:", track.title);
                const newArtist = prompt("Введіть виконавця:", track.artist);
                const newCover = prompt("Введіть URL нової обкладинки:", track.cover);

                if (newTitle !== null) track.title = newTitle || track.title;
                if (newArtist !== null) track.artist = newArtist || track.artist;
                if (newCover !== null) track.cover = newCover || track.cover;

                store.put(track).onsuccess = function() {
                    loadTracks();
                    if(currentTrackIndex !== -1 && filteredTracks[currentTrackIndex].id === id) {
                        // Оновити екран головного плеєра, якщо грає цей трек
                        document.getElementById('title').innerText = track.title;
                        document.getElementById('artist').innerText = track.artist;
                        coverArt.style.backgroundImage = `url('${track.cover}')`;
                    }
                };
            };
        }

        function deleteTrack(id, event) {
            event.stopPropagation();
            if(confirm("Видалити цю пісню?")) {
                const transaction = db.transaction(["tracks"], "readwrite");
                const store = transaction.objectStore("tracks");
                store.delete(id).onsuccess = function() { loadTracks(); };
            }
        }

        function selectTrack(index) {
            if(index < 0 || index >= filteredTracks.length) return;
            currentTrackIndex = index;
            isCrossfading = false;
            const track = filteredTracks[index];

            document.getElementById('title').innerText = track.title;
            document.getElementById('artist').innerText = track.artist;
            coverArt.style.backgroundImage = `url('${track.cover}')`;
            document.getElementById('listen-count').innerText = track.plays;

            if(audio.src) URL.revokeObjectURL(audio.src);
            audio.src = URL.createObjectURL(track.file);
            audio.volume = 1;
            togglePlay(true);
        }

        function togglePlay(forcePlay = false) {
            if (audio.paused || forcePlay) {
                audio.play().catch(() => console.log("Чекаємо тапу"));
                playBtn.innerText = "ПАУЗА";
                playBtn.style.backgroundColor = "#e91e63";
                if(coverZoomSwitch.checked) coverArt.style.transform = "scale(1.04)";
            } else {
                audio.pause();
                playBtn.innerText = "ГРАТИ";
                playBtn.style.backgroundColor = "var(--accent-color)";
                coverArt.style.transform = "scale(1)";
            }
        }

        function playNext() {
            if (currentTrackIndex + 1 < filteredTracks.length) {
                selectTrack(currentTrackIndex + 1);
            } else {
                selectTrack(0); // По колу на перший
            }
        }

        function playPrev() {
            if (currentTrackIndex - 1 >= 0) {
                selectTrack(currentTrackIndex - 1);
            }
        }

        // Кросфейд
        audio.ontimeupdate = function() {
            if (crossfadeSwitch.checked && audio.duration && (audio.duration - audio.currentTime <= 4) && !isCrossfading) {
                if (currentTrackIndex + 1 < filteredTracks.length) {
                    isCrossfading = true;
                    startCrossfade();
                }
            }
        };

        function startCrossfade() {
            const nextIndex = currentTrackIndex + 1;
            const nextTrack = filteredTracks[nextIndex];
            
            if(audioNext.src) URL.revokeObjectURL(audioNext.src);
            audioNext.src = URL.createObjectURL(nextTrack.file);
            audioNext.volume = 0;
            audioNext.play().catch(e => console.log(e));

            incrementPlayCount(filteredTracks[currentTrackIndex].id);

            let fadeInterval = setInterval(() => {
                if (audio.volume > 0.05) audio.volume -= 0.05; else audio.volume = 0;
                if (audioNext.volume < 0.95) audioNext.volume += 0.05; else audioNext.volume = 1;

                if (audio.volume === 0 && audioNext.volume === 1) {
                    clearInterval(fadeInterval);
                    audio.src = audioNext.src;
                    audio.currentTime = audioNext.currentTime;
                    audio.volume = 1;
                    currentTrackIndex = nextIndex;

                    document.getElementById('title').innerText = nextTrack.title;
                    document.getElementById('artist').innerText = nextTrack.artist;
                    coverArt.style.backgroundImage = `url('${nextTrack.cover}')`;
                    document.getElementById('listen-count').innerText = nextTrack.plays;
                    isCrossfading = false;
                }
            }, 200);
        }

        function incrementPlayCount(trackId) {
            const transaction = db.transaction(["tracks"], "readwrite");
            const store = transaction.objectStore("tracks");
            store.get(trackId).onsuccess = function(e) {
                const track = e.target.result;
                track.plays += 1;
                store.put(track).onsuccess = function() { loadTracks(); };
            };
        }

        audio.onended = function() {
            if (!isCrossfading && currentTrackIndex !== -1) {
                incrementPlayCount(filteredTracks[currentTrackIndex].id);
                playNext();
            }
        };

        function toggleSettings() {
            const el = document.getElementById('settings-container');
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }
    </script>
</body>
</html>
