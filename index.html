<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spotify - DemixSound Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --spotify-black: #000000;
            --spotify-dark-grey: #121212;
            --spotify-grey: #181818;
            --spotify-light-grey: #282828;
            --spotify-green: #1DB954;
            --spotify-text-white: #FFFFFF;
            --spotify-text-muted: #B3B3B3;
            --spotify-error: #F15E6C;
        }

        body {
            background-color: var(--spotify-black);
            color: var(--spotify-text-white);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .app-screen {
            display: none;
            flex-direction: column;
            padding: 16px;
            padding-bottom: 160px;
            box-sizing: border-box;
            width: 100%;
        }
        .app-screen.active-screen {
            display: flex;
        }

        /* --- ШАПКА --- */
        .main-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
        }
        .header-title {
            font-size: 22px;
            font-weight: 700;
        }

        /* --- ЧІПСИ --- */
        .filter-ribbon {
            display: flex;
            gap: 8px;
            padding: 4px 0 16px 0;
        }
        .filter-chip {
            background-color: var(--spotify-light-grey);
            color: var(--spotify-text-white);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .filter-chip.chip-active {
            background-color: var(--spotify-green);
            color: var(--spotify-black);
        }

        /* --- СПИСОК ТРЕКІВ --- */
        .library-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .media-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            background-color: var(--spotify-grey);
            border-radius: 6px;
            cursor: pointer;
        }
        .media-main-info {
            display: flex;
            align-items: center;
            flex-grow: 1;
            min-width: 0;
        }
        .media-art {
            width: 56px;
            height: 56px;
            border-radius: 4px;
            margin-right: 14px;
            object-fit: cover;
            background-color: var(--spotify-light-grey);
        }
        .media-text-block {
            display: flex;
            flex-direction: column;
            text-align: left;
            min-width: 0;
        }
        .media-title-text {
            font-size: 15px;
            font-weight: 600;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .media-title-text.playing-active {
            color: var(--spotify-green) !important;
        }
        .media-desc-text {
            font-size: 13px;
            color: var(--spotify-text-muted);
        }

        /* --- ФОРМИ ДОДАВАННЯ --- */
        .spotify-panel {
            background-color: var(--spotify-grey);
            border: 1px solid var(--spotify-light-grey);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--spotify-text-muted);
            text-transform: uppercase;
        }
        .spotify-input {
            width: 100%;
            padding: 12px;
            background-color: var(--spotify-light-grey);
            border: 1px solid transparent;
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
        }
        .file-input-wrapper {
            background-color: var(--spotify-light-grey);
            border: 1px dashed var(--spotify-green);
            padding: 20px;
            border-radius: 4px;
            text-align: center;
            color: var(--spotify-green);
            font-weight: 600;
            position: relative;
        }
        .file-input-wrapper input {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
        }
        .spotify-btn {
            background-color: var(--spotify-text-white);
            color: var(--spotify-black);
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- МІНІ-ПЛЕЄР --- */
        .bottom-playback-bar {
            position: fixed;
            bottom: 72px; left: 8px; right: 8px;
            height: 60px;
            background-color: #202020;
            border-radius: 8px;
            padding: 8px 12px;
            display: flex; align-items: center; justify-content: space-between;
            box-sizing: border-box;
            z-index: 95;
            display: none; /* Показується коли грає */
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        .mini-track-clickable { display: flex; align-items: center; flex-grow: 1; min-width: 0; }
        .mini-track-art { width: 44px; height: 44px; border-radius: 4px; margin-right: 12px; object-fit: cover; }
        .mini-track-details { display: flex; flex-direction: column; text-align: left; min-width: 0; }
        .mini-track-title { font-size: 13px; font-weight: 600; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-track-artist { font-size: 11px; color: var(--spotify-text-muted); }
        .progress-indicator-bar { position: absolute; bottom: 0; left: 8px; right: 8px; height: 2px; background-color: rgba(255,255,255,0.1); }
        .progress-indicator-fill { height: 100%; width: 0%; background-color: white; }

        /* --- ПОВНОЕКРАННИЙ ПЛЕЄР --- */
        .fullscreen-player-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, #333 0%, #000 100%);
            z-index: 200; display: none; flex-direction: column; padding: 24px; box-sizing: border-box;
            padding-top: calc(24px + env(safe-area-inset-top));
        }
        .fullscreen-player-overlay.overlay-open { display: flex; }
        .fs-player-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .fs-big-cover-art { width: 100%; max-width: 300px; aspect-ratio: 1/1; margin: 0 auto 40px auto; border-radius: 8px; background-size: cover; background-position: center; background-color: #222; }
        .fs-track-meta { text-align: left; margin-bottom: 24px; }
        .fs-track-title { font-size: 22px; font-weight: 700; }
        .fs-track-artist { font-size: 16px; color: var(--spotify-text-muted); }
        .fs-slider-input { width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.2); height: 4px; border-radius: 2px; }
        .fs-slider-input::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: white; }
        .fs-time-stamps { display: flex; justify-content: space-between; font-size: 12px; color: var(--spotify-text-muted); margin-top: 8px; }
        .fs-controls-panel { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        .fs-center-play-btn { width: 64px; height: 64px; border-radius: 50%; background-color: white; color: black; display: flex; align-items: center; justify-content: center; font-size: 24px; border: none; }

        /* --- МЕНЮ НАВІГАЦІЇ --- */
        .bottom-nav-navigation {
            position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
            background-color: rgba(0, 0, 0, 0.95); display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-tab-item { display: flex; flex-direction: column; align-items: center; color: var(--spotify-text-muted); font-size: 11px; gap: 4px; cursor: pointer; }
        .nav-tab-item.tab-selected { color: white; }
    </style>
</head>
<body>

    <audio id="audio-player" preload="auto"></audio>

    <div id="screen-library" class="app-screen active-screen">
        <div class="main-header">
            <div class="header-title">Музична Бібліотека</div>
            <div style="font-size: 22px; cursor: pointer;" onclick="switchScreen('screen-add')">＋</div>
        </div>

        <div class="filter-ribbon">
            <button class="filter-chip chip-active">Усі треки</button>
        </div>

        <div class="library-list" id="tracks-container">
            </div>
    </div>

    <div id="screen-add" class="app-screen">
        <div class="main-header"><div class="header-title">Завантажити трек</div></div>
        <div class="spotify-panel">
            <div class="form-group">
                <label>Аудіофайл (.mp3 / .m4a)</label>
                <div class="file-input-wrapper">
                    <span id="file-status">Оберіть аудіозапис</span>
                    <input type="file" id="form-file" accept="audio/*" onchange="handleFileCheck(this)">
                </div>
            </div>
            <div class="form-group">
                <label>Назва пісні</label>
                <input type="text" id="form-title" class="spotify-input" placeholder="Введіть назву">
            </div>
            <div class="form-group">
                <label>Виконавець</label>
                <input type="text" id="form-artist" class="spotify-input" placeholder="Ім'я артиста">
            </div>
            <div class="form-group">
                <label>URL Обкладинки (зображення)</label>
                <input type="url" id="form-cover" class="spotify-input" placeholder="Посилання на фото (необов'язково)">
            </div>
            <button class="spotify-btn" onclick="saveTrackToDB()">Зберегти та включити</button>
        </div>
    </div>

    <div class="bottom-playback-bar" id="mini-player">
        <div class="mini-track-clickable" onclick="toggleFullscreen(true)">
            <img src="" class="mini-track-art" id="mini-art">
            <div class="mini-track-details">
                <div class="mini-track-title" id="mini-title">Назва</div>
                <div class="mini-track-artist" id="mini-artist">Артист</div>
            </div>
        </div>
        <button style="background:none; border:none; color:white; font-size:22px; padding:10px;" id="mini-play-btn" onclick="togglePlayPause()">▶</button>
        <div class="progress-indicator-bar"><div class="progress-indicator-fill" id="mini-progress"></div></div>
    </div>

    <div class="fullscreen-player-overlay" id="fullscreen-player">
        <div class="fs-player-header">
            <span style="font-size: 24px; cursor: pointer;" onclick="toggleFullscreen(false)">▼</span>
            <span style="font-size: 12px; font-weight:700; text-transform:uppercase;">Зараз грає</span>
            <span>⋮</span>
        </div>
        <div class="fs-big-cover-art" id="fs-art"></div>
        <div class="fs-track-meta">
            <div class="fs-track-title" id="fs-title">Назва треку</div>
            <div class="fs-track-artist" id="fs-artist">Виконавець</div>
        </div>
        <div>
            <input type="range" class="fs-slider-input" id="fs-slider" min="0" value="0" oninput="seekAudio(this)">
            <div class="fs-time-stamps">
                <span id="time-current">0:00</span>
                <span id="time-duration">0:00</span>
            </div>
        </div>
        <div class="fs-controls-panel">
            <button style="background:none; border:none; color:white; font-size:24px;" onclick="playPrev()">⏮</button>
            <button class="fs-center-play-btn" id="fs-play-btn" onclick="togglePlayPause()">▶</button>
            <button style="background:none; border:none; color:white; font-size:24px;" onclick="playNext()">⏭</button>
        </div>
    </div>

    <div class="bottom-nav-navigation">
        <div class="nav-tab-item tab-selected" id="n-lib" onclick="switchScreen('screen-library')"><span>🏠</span><div>Головна</div></div>
        <div class="nav-tab-item" id="n-add" onclick="switchScreen('screen-add')"><span>＋</span><div>Додати</div></div>
    </div>

    <script>
        let db = null;
        let tracksList = [];
        let currentIdx = -1;
        const player = document.getElementById('audio-player');

        // Відкриваємо Базу Даних IndexedDB
        const request = indexedDB.open("SafariMusicFixDatabase", 3);
        request.onupgradeneeded = (e) => {
            let database = e.target.result;
            if(!database.objectStoreNames.contains("songs")) {
                database.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
            }
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            loadTracks();
        };

        function switchScreen(id) {
            document.querySelectorAll('.app-screen').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-tab-item').forEach(n => n.classList.remove('tab-selected'));
            document.getElementById(id).style.display = 'flex';
            if(id === 'screen-library') document.getElementById('n-lib').classList.add('tab-selected');
            if(id === 'screen-add') document.getElementById('n-add').classList.add('tab-selected');
        }

        function handleFileCheck(input) {
            const file = input.files[0];
            if(!file) return;
            document.getElementById('file-status').innerText = `Обрано: ${file.name}`;
        }

        // ЗБЕРЕЖЕННЯ ТРЕКУ ЧЕРЕЗ FILEREADER (ДЛЯ ОБХОДУ БЛОКУВАННЯ SAFARI)
        function saveTrackToDB() {
            const fileInput = document.getElementById('form-file');
            const titleInput = document.getElementById('form-title');
            const artistInput = document.getElementById('form-artist');
            const coverInput = document.getElementById('form-cover');

            if(!fileInput.files[0] || !titleInput.value.trim()) {
                alert("Оберіть файл та введіть назву пісні!");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const songData = {
                    title: titleInput.value.trim(),
                    artist: artistInput.value.trim() || "Невідомий виконавець",
                    cover: coverInput.value.trim() || "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=500",
                    audioDataUrl: event.target.result // Звук у форматі тексту безпечний для iOS
                };

                const tx = db.transaction(["songs"], "readwrite");
                tx.objectStore("songs").add(songData);
                tx.oncomplete = () => {
                    titleInput.value = ''; artistInput.value = ''; coverInput.value = ''; fileInput.value = '';
                    document.getElementById('file-status').innerText = "Оберіть аудіозапис";
                    loadTracks();
                    switchScreen('screen-library');
                };
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        function loadTracks() {
            const tx = db.transaction(["songs"], "readonly");
            tx.objectStore("songs").getAll().onsuccess = (e) => {
                tracksList = e.target.result;
                renderTracks();
            };
        }

        function renderTracks() {
            const container = document.getElementById('tracks-container');
            container.innerHTML = '';

            if(tracksList.length === 0) {
                container.innerHTML = '<p style="color:gray; font-size:14px; margin-top:20px;">Плейліст порожній. Натисніть ＋ зверху, щоб завантажити музику.</p>';
                return;
            }

            tracksList.forEach((track, index) => {
                const row = document.createElement('div');
                row.className = 'media-row';
                row.onclick = () => startPlayback(index); // Прямий тап викликає звук
                row.innerHTML = `
                    <div class="media-main-info">
                        <img src="${track.cover}" class="media-art">
                        <div class="media-text-block">
                            <div class="media-title-text" id="t-text-${index}">${track.title}</div>
                            <div class="media-desc-text">${track.artist}</div>
                        </div>
                    </div>
                    <div style="color:gray; padding:10px;" onclick="deleteTrack(${track.id}, event)">×</div>
                `;
                container.appendChild(row);
            });
        }

        // ЗАПУСК ВІДТВОРЕННЯ (МИТТЄВИЙ ТАП)
        function startPlayback(index) {
            if(index < 0 || index >= tracksList.length) return;
            currentIdx = index;
            const track = tracksList[currentIdx];

            // Розігрів аудіосистеми iPhone
            player.src = track.audioDataUrl;
            player.load();

            // Оновлюємо UI тексти
            document.getElementById('mini-title').innerText = track.title;
            document.getElementById('mini-artist').innerText = track.artist;
            document.getElementById('mini-art').src = track.cover;

            document.getElementById('fs-title').innerText = track.title;
            document.getElementById('fs-artist').innerText = track.artist;
            document.getElementById('fs-art').style.backgroundImage = `url('${track.cover}')`;

            // Підсвічуємо зелений колір у списку
            document.querySelectorAll('.media-title-text').forEach(t => t.classList.remove('playing-active'));
            const currentTitleText = document.getElementById(`t-text-${index}`);
            if(currentTitleText) currentTitleText.classList.add('playing-active');

            document.getElementById('mini-player').style.display = 'flex';

            player.play().then(() => {
                document.getElementById('mini-play-btn').innerText = "⏸";
                document.getElementById('fs-play-btn').innerText = "⏸";
            }).catch(err => {
                alert("Помилка активації звуку в iOS Safari. Натисніть кнопку Play ще раз.");
            });
        }

        function togglePlayPause() {
            if(player.paused) {
                player.play();
                document.getElementById('mini-play-btn').innerText = "⏸";
                document.getElementById('fs-play-btn').innerText = "⏸";
            } else {
                player.pause();
                document.getElementById('mini-play-btn').innerText = "▶";
                document.getElementById('fs-play-btn').innerText = "▶";
            }
        }

        player.ontimeupdate = () => {
            if(!player.duration) return;
            const progress = (player.currentTime / player.duration) * 100;
            document.getElementById('mini-progress').style.width = `${progress}%`;

            const slider = document.getElementById('fs-slider');
            slider.max = Math.floor(player.duration);
            slider.value = Math.floor(player.currentTime);

            document.getElementById('time-current').innerText = formatTime(player.currentTime);
            document.getElementById('time-duration').innerText = formatTime(player.duration);
        };

        player.onended = () => {
            playNext();
        };

        function playNext() {
            if(currentIdx + 1 < tracksList.length) startPlayback(currentIdx + 1);
        }

        function playPrev() {
            if(currentIdx - 1 >= 0) startPlayback(currentIdx - 1);
        }

        function seekAudio(slider) {
            player.currentTime = slider.value;
        }

        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function toggleFullscreen(open) {
            document.getElementById('fullscreen-player').classList.toggle('overlay-open', open);
        }

        function deleteTrack(id, event) {
            event.stopPropagation();
            if(!confirm("Видалити трек?")) return;
            const tx = db.transaction(["songs"], "readwrite");
            tx.objectStore("songs").delete(id);
            tx.oncomplete = () => loadTracks();
        }
    </script>
</body>
</html>
